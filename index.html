<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <title>家族通話</title>
  </head>
  <body>
    <main id="app">
      <!-- 自分を選ぶ -->
      <section id="setup-panel" class="panel hidden">
        <h1 class="app-title">家族通話</h1>
        <p class="lead">このスマホは<br />どなたが使いますか？</p>
        <div id="member-choices" class="card-list"></div>
      </section>

      <!-- ホーム（電話帳） -->
      <section id="home-panel" class="panel hidden">
        <div class="home-head">
          <h1 class="app-title">家族通話</h1>
          <button id="change-me" class="link" type="button">変更</button>
        </div>
        <p class="lead">だれに電話しますか？</p>
        <div id="contact-list" class="card-list"></div>
        <button id="msg-home-btn" class="msg-btn" type="button">💬 メッセージ</button>
      </section>

      <!-- 発信中 -->
      <section id="calling-panel" class="screen calling-screen hidden">
        <div class="screen-top">
          <div id="calling-avatar" class="avatar big"></div>
          <p class="screen-name"><span id="calling-name"></span></p>
          <p class="screen-sub">呼び出し中…</p>
        </div>
        <div class="screen-actions">
          <button id="cancel-btn" class="circle-btn red" type="button">
            <span class="ico">✕</span><span class="lbl">取り消す</span>
          </button>
        </div>
      </section>

      <!-- 着信（電話風） -->
      <section id="incoming-panel" class="screen incoming-screen hidden">
        <div class="screen-top">
          <div id="incoming-avatar" class="avatar big"></div>
          <p class="screen-name"><span id="incoming-name"></span> から着信</p>
          <p class="screen-sub">応答しますか？</p>
        </div>
        <div class="screen-actions wide">
          <button id="accept-btn" class="circle-btn green" type="button">
            <span class="ico">📞</span><span class="lbl">応答</span>
          </button>
          <button id="decline-btn" class="circle-btn red" type="button">
            <span class="ico">⛔</span><span class="lbl">拒否</span>
          </button>
        </div>
      </section>

      <!-- 通話中 -->
      <section id="call-panel" class="screen incall-screen hidden">
        <div class="screen-top">
          <div id="call-avatar" class="avatar big"></div>
          <p class="screen-name"><span id="peer-name"></span> と通話中</p>
          <p class="screen-sub">
            <span id="call-timer">00:00</span>
            <span id="status" class="status-mini"></span>
          </p>
        </div>
        <div class="incall-controls">
          <button id="speaker-btn" class="row-btn" type="button">
            <span>🔊 スピーカー</span>
            <span id="speaker-toggle" class="toggle"></span>
          </button>
          <button id="msg-call-btn" class="row-btn" type="button">💬 メッセージ</button>
        </div>
        <button id="end-btn" class="end-btn" type="button">⛔ 終了</button>
      </section>

      <p id="error" class="error hidden"></p>
    </main>

    <audio id="remote-audio" autoplay playsinline></audio>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
